# settings for individual data sources
data:
  datasets:
    setting: true
  dataset_collections:
    setting: true

# settings that go into the energy_system folder
energy_system:
  units:
    base_units:
      - hour
      - GW
      - km
      - megatons
      - megaEuro
      - kilotCO2eq
      - megapkm
      - megatkm
      - ktonproduct
    definitions:
      Euro:
        dimension: currency
        aliases:
          - EURO
          - Eur
      tCO2eq:
        dimension: massCO2eq
        aliases:
          - tonCO2eq
          - tCO2
          - tonne_carbon
      pkm:
        dimension: mileage
        aliases:
          - passenger_km
          - passenger_kilometer
      tkm:
        dimension: tonne_mileage
        aliases:
          - tonne_km
          - tonne_kilometer
      tonproduct:
        dimension: mass_product
        aliases:
          - tproduct
          - tonne_product
  parameters_interpolation_off:
    parameter_name:
      - carbon_emissions_limit
